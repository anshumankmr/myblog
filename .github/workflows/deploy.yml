name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: blog/next-blog/package-lock.json

      - name: Install dependencies
        working-directory: blog/next-blog
        run: npm ci

      - name: Fetch content
        working-directory: blog/next-blog
        run: node scripts/fetch-content.mjs

      - name: Build
        working-directory: blog/next-blog
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy blog/next-blog/out --project-name=myblog --branch=main
